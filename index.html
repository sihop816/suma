<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .board { display: grid; grid-template-columns: repeat(8, 1fr); width: 400px; height: 400px; }
        .square { width: 50px; height: 50px; }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        .piece { font-size: 2em; text-align: center; }
    </style>
</head>
<body>
    <h1>Chess Game</h1>
    <div class="board"></div>
    <script>
        const board = document.querySelector('.board');
        const initialBoard = [
            'r','n','b','q','k','b','n','r',
            'p','p','p','p','p','p','p','p',
            ' ',' ',' ',' ',' ',' ',' ',' ',
            ' ',' ',' ',' ',' ',' ',' ',' ',
            ' ',' ',' ',' ',' ',' ',' ',' ',
            ' ',' ',' ',' ',' ',' ',' ',' ',
            'P','P','P','P','P','P','P','P',
            'R','N','B','Q','K','B','N','R'
        ];

        function createBoard() {
            for (let i = 0; i < initialBoard.length; i++) {
                const square = document.createElement('div');
                square.className = 'square ' + ((Math.floor(i / 8) + i) % 2 === 0 ? 'light' : 'dark');
                square.dataset.index = i;
                square.innerHTML = initialBoard[i] !== ' ' ? `<span class="piece">${initialBoard[i]}</span>` : '';
                board.appendChild(square);
            }
        }

        createBoard();

        // Add event listeners for piece movement
        // Game logic will go here
    </script>
</body>
</html>
